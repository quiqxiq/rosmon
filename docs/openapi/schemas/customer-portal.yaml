CustomerLoginRequest:
  type: object
  required: [phone, password]
  properties:
    phone:    { type: string, minLength: 3, maxLength: 20, example: "081234567890" }
    password: { type: string, minLength: 1, maxLength: 128 }

CustomerLoginResponse:
  type: object
  required: [access_token, token_type, expires_in, customer]
  properties:
    access_token: { type: string, description: "JWT customer access token (scope terpisah)" }
    token_type:   { type: string, example: "Bearer" }
    expires_in:   { type: integer, description: "TTL detik", example: 86400 }
    customer:     { $ref: '#/CustomerMeResponse' }

CustomerMeResponse:
  type: object
  required: [id, full_name, phone, status]
  properties:
    id:        { type: integer, format: int64, example: 12 }
    full_name: { type: string, example: "Pak Budi" }
    phone:     { type: string, example: "081234567890" }
    address:   { type: string }
    area:      { type: string }
    status:    { type: string, enum: [aktif, nonaktif] }

ChangePasswordRequest:
  type: object
  required: [old_password, new_password]
  properties:
    old_password: { type: string, minLength: 1, maxLength: 128 }
    new_password: { type: string, minLength: 8, maxLength: 128 }

SetPortalPasswordRequest:
  type: object
  required: [password]
  properties:
    password: { type: string, minLength: 8, maxLength: 128, description: "Password login portal pelanggan" }

PaymentCollectRequest:
  type: object
  description: |
    Settle-by-code: petugas scan QR / input kode unik invoice saat menerima
    tunai → pembayaran instan + layanan dipulihkan. method default `cash`.
  required: [code]
  properties:
    code:   { type: string, minLength: 4, maxLength: 32, example: "ABC23XYZ90" }
    method: { type: string, enum: [cash, manual_transfer], default: cash }

PortalInvoiceResponse:
  type: object
  description: Tagihan pelanggan. `payment_code` + `qr_content` untuk pembayaran via kode/QR.
  properties:
    id:             { type: integer, format: int64 }
    invoice_number: { type: string, example: "INV-2026-05-0001" }
    amount:         { type: integer, format: int64, example: 150000 }
    period_start:   { type: string, format: date-time }
    period_end:     { type: string, format: date-time }
    due_date:       { type: string, format: date-time }
    status:         { type: string, enum: [draft, issued, paid, overdue, cancelled] }
    payment_code:   { type: string, example: "ABC23XYZ90", description: "Kode unik (kosong bila sudah lunas)" }
    qr_content:     { type: string, example: "rosmon-pay:ABC23XYZ90", description: "Isi QR (render sisi-klien)" }
    paid_at:        { type: string, format: date-time, nullable: true }

PortalPaymentResponse:
  type: object
  properties:
    id:         { type: integer, format: int64 }
    invoice_id: { type: integer, format: int64 }
    amount:     { type: integer, format: int64 }
    method:     { type: string, enum: [cash, manual_transfer] }
    status:     { type: string, enum: [pending, confirmed, rejected] }
    confirmed_at: { type: string, format: date-time, nullable: true }
    created_at: { type: string, format: date-time }

PortalSubscriptionResponse:
  type: object
  properties:
    id:               { type: integer, format: int64 }
    service_type:     { type: string, enum: [pppoe, hotspot] }
    mikrotik_username: { type: string }
    status:           { type: string, enum: [pending_install, active, isolir, suspended, terminated] }
    sync_status:      { type: string }
    next_invoice_date: { type: string, format: date-time, nullable: true }

services:
  postgres:
    image: postgres:17-alpine
    container_name: rosmon-postgres
    environment:
      POSTGRES_DB: mikhmon
      POSTGRES_USER: mikhmon
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikhmon -d mikhmon"]
      interval: 5s
      timeout: 3s
      retries: 10

  influxdb3:
    image: quay.io/influxdb/influxdb3-core:latest
    container_name: rosmon-influx
    command:
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3
      - --http-bind=0.0.0.0:8181
      - --without-auth
    ports:
      - "8181:8181"
    volumes:
      - influx_data:/var/lib/influxdb3
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8181/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: rosmon-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mikhmon
      - DB_USER=mikhmon
      - DB_PASSWORD=secret
      - DB_SSLMODE=disable
      - INFLUX_ENABLED=true
      - INFLUX_HOST=http://influxdb3:8181
      - INFLUX_TOKEN=dev_admin_token_placeholder
      - INFLUX_DATABASE=mikhmon
      - HTTP_BIND=0.0.0.0:8080
      - CORS_ALLOWED_ORIGINS=*
      - JWT_SECRET=replace-with-32-char-or-longer-secret-string-here
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=adminpass
    depends_on:
      postgres:
        condition: service_healthy
      influxdb3:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: rosmon-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  influx_data:
  backend_data:
  uploads_data:

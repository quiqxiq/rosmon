openapi: 3.0.3

info:
  title: roslib-mikhmon HTTP API
  version: "1.0.0"
  description: |
    REST + Server-Sent Events service di atas RouterOS API. Multi-router:
    semua endpoint (kecuali Device CRUD & Health) berada di bawah
    `/api/v1/devices/{device_id}/...` agar satu instance bisa melayani
    banyak router sekaligus.

    ## Response envelope

    Semua endpoint pakai envelope konsisten:

    - **Success single**: `{ "data": { ... } }`
    - **Success list**:   `{ "data": [ ... ], "meta": { "count": N } }`
    - **Error**:          `{ "error": { "code": "...", "message": "...", "path": "..." } }`

    Error `code` stabil — frontend bisa branch dengan aman. Mapping:

    | Code | HTTP | Trigger |
    |---|---|---|
    | `NOT_FOUND` | 404 | `mikrotik.ErrNotFound` |
    | `INVALID_ARGUMENT` | 400 | `mikrotik.ErrInvalidArgument` |
    | `AMBIGUOUS` | 409 | `mikrotik.ErrAmbiguous` |
    | `VALIDATION` | 400 | body gagal validasi `gin` binding |
    | `TIMEOUT` | 504 | `context.DeadlineExceeded` |
    | `CANCELED` | 499 | `context.Canceled` |
    | `INTERNAL` | 500 | uncategorized / panic recovery |
    | `DEVICE_NOT_FOUND` | 404 | device middleware: slug tidak terhubung |
    | `SERVICE_UNAVAILABLE` | 503 | InfluxDB / dependency lain down |

    Setiap response menyertakan header `X-Request-ID` (16-char hex) untuk
    korelasi log.

    ## Authentication

    Service ini sekarang mendukung **JWT access + refresh token**
    (HS256). Bootstrap admin awal via env `ADMIN_USERNAME` / `ADMIN_PASSWORD`.

    1. `POST /auth/login` → terima access (15 menit) + refresh (7 hari) token.
    2. Pakai access token di header: `Authorization: Bearer <access_token>`.
    3. Saat access expire → `POST /auth/refresh` (rotation).
    4. `POST /auth/logout` revoke refresh token.

    Role RBAC sederhana: `admin` (full), `operator` (CRUD device-scoped tanpa
    `/auth/users`/reboot/shutdown), `viewer` (read-only).

    ## Rate Limit & SSE Subscriber Cap

    Semua endpoint authenticated: 60 req/menit per user (configurable via
    `RATE_LIMIT_USER_RPM`). Endpoint mahal (voucher generate, bulk delete,
    reboot, shutdown) dibatasi 10 req/menit. Endpoint anon (`/auth/login`,
    `/healthz`) dibatasi 20 req/menit per IP.

    SSE subscriber cap: 20 per topic, 50 per device (configurable). 429 +
    `Retry-After` header dikembalikan saat terlewat.

    ## Cara pakai SSE

    Endpoint `/stream/*` mengembalikan `text/event-stream`. Format event:
    ```
    event: <type>
    id: <id>
    data: <JSON payload>

    ```
    JS contoh: `new EventSource('/api/v1/devices/rb-main/stream/hotspot/active')`.

  contact:
    name: roslib-mikhmon
    url: https://github.com/quiqxiq/roslib-mikhmon
  license:
    name: Internal

servers:
  - url: http://127.0.0.1:8080/api/v1
    description: Default local-only bind

tags:
  - name: Devices
    description: |
      CRUD device (slug, address, credential). Tidak butuh router fisik
      nyala — endpoint ini hanya menyentuh database.
  - name: System
    description: |
      Sistem-level RouterOS: identity, resource (CPU/mem/HDD), routerboard,
      clock, reboot/shutdown, logging config, /log read.
  - name: System Scripts
    description: CRUD `/system/script` (workflow on-login, transaksi, dll.).
  - name: System Schedulers
    description: CRUD `/system/scheduler` (expiry job, kron, dll.).
  - name: Hotspot Users
    description: CRUD user hotspot, bulk delete, reset counter/usage.
  - name: Hotspot Profiles
    description: CRUD profile hotspot.
  - name: Hotspot Sessions
    description: List & kick session aktif hotspot.
  - name: Hotspot Misc
    description: Server, Host, Cookie, Binding.
  - name: Vouchers
    description: Generator batch voucher (workflow).
  - name: Network
    description: Interface, IP pool, ARP, DHCP lease, simple queue.
  - name: PPP
    description: PPP secret, profile, active session.
  - name: Streaming
    description: |
      Server-Sent Events untuk update real-time. Tiap endpoint
      menggunakan broker shared yang fan-out ke banyak subscriber tanpa
      duplikasi backend stream.
  - name: History
    description: |
      Query data historis dari InfluxDB (CPU, traffic, sales). Hanya
      tersedia kalau `INFLUX_URL` di-set saat startup.
  - name: Reports
    description: |
      Laporan penjualan voucher dari database lokal (Postgres). Tetap
      bisa di-query meskipun router offline.
  - name: Health
    description: Health probe (DB + device manager + InfluxDB + SSE).
  - name: Auth
    description: |
      Login, refresh, logout, dan profil user yang sedang aktif. Tiga endpoint
      pertama public (override `security: []`), sisanya butuh Bearer token.
  - name: Users
    description: |
      CRUD user (admin role required). Mengubah password / role / active=false
      otomatis revoke semua refresh token milik user tersebut.
  - name: Profile Configs
    description: |
      Konfigurasi mikhmon-local per hotspot profile (validity, harga,
      expiry mode, lock MAC). Terpisah dari profile router-side.

security:
  - bearerAuth: []


    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    get:
      tags:
        - Streaming
      summary: Stream inactive hotspot users (SSE derived)
      description: |
        Derived stream dari enabled hotspot users minus active sessions. Event

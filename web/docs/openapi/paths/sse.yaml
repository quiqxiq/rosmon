# Server-Sent Events (text/event-stream) for logs + telemetry.
#
# Source:
#   internal/api/handlers/sse/log_sse_handler.go
#   internal/api/handlers/sse/telemetry_sse_handler.go
#
# Each operation is marked `x-sse: true` and returns `text/event-stream`.
# The schema describes ONE event payload (one `data:` line). Browsers
# using EventSource cannot send custom headers, so these endpoints also
# accept the JWT via `?token=<access_token>` query string.

logsAll:
  get:
    operationId: streamRouterLogsAll
    summary: SSE stream of all RouterOS log lines for one router
    tags: [sse]
    x-sse: true
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: query
        name: token
        schema: { type: string }
        description: Access JWT for clients that cannot send the `Authorization` header (EventSource).
    responses:
      '200':
        description: Stream opens.
        content:
          text/event-stream:
            schema:
              description: 'Each `data:` frame contains a `LogEvent`.'
              $ref: '../components/schemas/sse.yaml#/LogEvent'
      '400': { $ref: '../components/responses.yaml#/BadRequest' }
      '401': { $ref: '../components/responses.yaml#/Unauthorized' }
      '500': { $ref: '../components/responses.yaml#/InternalError' }

logsHotspot:
  get:
    operationId: streamRouterLogsHotspot
    summary: SSE stream of hotspot-only log lines
    tags: [sse]
    x-sse: true
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: query
        name: token
        schema: { type: string }
    responses:
      '200':
        description: Stream opens.
        content:
          text/event-stream:
            schema: { $ref: '../components/schemas/sse.yaml#/LogEvent' }

logsPPP:
  get:
    operationId: streamRouterLogsPPP
    summary: SSE stream of PPP-only log lines
    tags: [sse]
    x-sse: true
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: query
        name: token
        schema: { type: string }
    responses:
      '200':
        description: Stream opens.
        content:
          text/event-stream:
            schema: { $ref: '../components/schemas/sse.yaml#/LogEvent' }


# VPS Production Override
# Digunakan di VPS bersama docker/docker-compose.yml:
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.vps.yml up -d --build
#

services:
  postgres:
    profiles: ["disabled"]
  influxdb3:
    profiles: ["disabled"]

  backend:
    depends_on: []
    networks:
      - default
      - db-tools_default
    env_file:
      - ../.env
    environment:
      - DB_HOST=${DB_HOST:-postgres-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-rosmon}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-JituPasswordPostgres123!}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - INFLUX_ENABLED=${INFLUX_ENABLED:-true}
      - INFLUX_HOST=${INFLUX_HOST:-http://influxdb-db:8181}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-apiv3_DYEDNDoSz2X9YPCt5IpB0v70n5giIQ4ZQmzW7ttaYSZXw4s8KjnO848p4bzrCaZymB44ShbtLPUD0lhWASRSGA}
      - INFLUX_DATABASE=${INFLUX_DATABASE:-rosmon}
      - HTTP_BIND=${HTTP_BIND:-0.0.0.0:8080}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://rosmon.ghaibnet.co.id}
      - GO_SERVICE_URL=${GO_SERVICE_URL:-https://rosmon.ghaibnet.co.id}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DEVICE_PASSWORD_KEY=${DEVICE_PASSWORD_KEY}

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=

networks:
  db-tools_default:
    external: true

<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Masuk — Rosmon</title>
  <link rel="stylesheet" href="css/rosmon.css" />
</head>
<body>
  <div class="app-shell">
    <div class="app-content no-tab" style="display:flex;flex-direction:column;justify-content:center;min-height:100dvh;padding-top:48px;padding-bottom:48px;">

      <div style="text-align:center;margin-bottom:40px;">
        <div style="width:64px;height:64px;border-radius:16px;background:var(--primary);display:inline-grid;place-items:center;margin-bottom:16px;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
            <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <circle cx="12" cy="20" r="1"/>
          </svg>
        </div>
        <h1 style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--fg);margin-bottom:4px;">Rosmon</h1>
        <p style="font-size:15px;color:var(--fg-secondary);">Portal Pelanggan</p>
      </div>

      <div style="margin-bottom:32px;">
        <h2 style="font-size:20px;font-weight:600;color:var(--fg);margin-bottom:4px;">Masuk ke Akun Anda</h2>
        <p style="font-size:14px;color:var(--muted);">Gunakan nomor HP dan password Anda</p>
      </div>

      <form id="loginForm" style="display:flex;flex-direction:column;gap:16px;" novalidate>
        <div class="input-group">
          <label class="input-label" for="phone">Nomor HP</label>
          <input
            class="input-field"
            type="tel"
            id="phone"
            inputmode="numeric"
            placeholder="08xxxxxxxxxx"
            autocomplete="tel"
            required
          />
        </div>

        <div class="input-group">
          <label class="input-label" for="password">Password</label>
          <div class="input-wrapper">
            <input
              class="input-field"
              type="password"
              id="password"
              placeholder="Masukkan password"
              autocomplete="current-password"
              required
              style="padding-right:52px;"
            />
            <button type="button" class="input-toggle" id="togglePw" aria-label="Tampilkan password">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMessage" class="error-text" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Nomor HP atau password salah
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn" style="margin-top:8px;">
          Masuk
        </button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--muted);">
        Lupa password? <span style="color:var(--primary);font-weight:500;cursor:pointer;">Hubungi admin Anda</span>
      </p>

      <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted);">
        Belum punya akun? <a href="landing.html#daftar" style="color:var(--primary);font-weight:600;text-decoration:none;">Daftar sekarang</a>
      </p>

    </div>
  </div>

  <script>
    (function() {
      var toggle = document.getElementById('togglePw');
      var pwField = document.getElementById('password');
      var form = document.getElementById('loginForm');
      var btn = document.getElementById('loginBtn');
      var errMsg = document.getElementById('errorMessage');
      var phoneInput = document.getElementById('phone');
      var showing = false;

      toggle.addEventListener('click', function() {
        showing = !showing;
        pwField.type = showing ? 'text' : 'password';
        toggle.innerHTML = showing
          ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
          : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        errMsg.style.display = 'none';
        phoneInput.classList.remove('input-error');
        pwField.classList.remove('input-error');

        btn.classList.add('btn-loading');
        btn.disabled = true;

        setTimeout(function() {
          btn.classList.remove('btn-loading');
          btn.disabled = false;

          if (phoneInput.value === '081234567890' && pwField.value === 'rosmon') {
            window.location.href = 'home.html';
          } else {
            errMsg.style.display = 'flex';
            phoneInput.classList.add('input-error');
            pwField.classList.add('input-error');
          }
        }, 1500);
      });

      try {
        if (localStorage.getItem('rosmon:dark') === '1') {
          document.documentElement.classList.add('dark');
        }
      } catch(_) {}
    })();
  </script>
</body>
</html>

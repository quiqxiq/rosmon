# /routers/{routerId}/hotspot/* operations.
# Source: internal/api/handlers/hotspot_handler.go +
#         internal/roskit/adapter/service/hotspot.go.

# ===== Users ==================================================================

listUsers:
  get:
    operationId: listHotspotUsers
    summary: List hotspot users
    tags: [hotspot]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: query
        name: profile
        schema: { type: string }
        description: Filter by profile name.
    responses:
      '200':
        description: Array of hotspot users (raw RouterOS records).
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/hotspot.yaml#/HotspotUserRecord' }
                error: { type: 'null' }
            example:
              data:
                - .id: '*A1'
                  name: voucher-7g3pq
                  password: 7g3pq
                  profile: 1d-1mbps
                  server: hotspot1
                  mac-address: '00:11:22:33:44:55'
                  bytes-in: '15823234'
                  bytes-out: '982341'
                  disabled: 'false'
              error: null
      '404': { $ref: '../components/responses.yaml#/NotFound' }
      '500': { $ref: '../components/responses.yaml#/InternalError' }

getUserCount:
  get:
    operationId: getHotspotUserCount
    summary: Total hotspot user count
    tags: [hotspot]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: query
        name: profile
        schema: { type: string }
        description: Optional — count only users in this profile.
    responses:
      '200':
        description: Count.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:
                  type: object
                  required: [count]
                  properties:
                    count: { type: integer, format: int64, minimum: 0 }
                error: { type: 'null' }
            example:
              data: { count: 42 }
              error: null
      '500': { $ref: '../components/responses.yaml#/InternalError' }

exportUsers:
  get:
    operationId: exportHotspotUsers
    summary: Export hotspot users (CSV or RouterOS script)
    tags: [hotspot]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: query
        name: profile
        schema: { type: string }
      - in: query
        name: format
        schema:
          type: string
          enum: [csv, script]
          default: script
        description: |
          `csv` returns a CSV download. `script` (default) returns a
          RouterOS `/ip/hotspot/user/add` script that can be pasted
          directly into a terminal.
    responses:
      '200':
        description: |
          Response type depends on `format`:
          - `csv` → `text/csv` with `Content-Disposition: attachment`
          - `script` → `text/plain` with raw RouterOS commands
        content:
          text/csv:
            schema:
              type: string
              format: binary
          text/plain:
            schema:
              type: string
      '500': { $ref: '../components/responses.yaml#/InternalError' }

getUser:
  get:
    operationId: getHotspotUser
    summary: Get a hotspot user by RouterOS ID or name
    tags: [hotspot]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: path
        name: id
        required: true
        schema: { type: string, minLength: 1, maxLength: 64 }
        description: RouterOS `.id` (starts with `*`) or the user name.
    responses:
      '200':
        description: User record.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:  { $ref: '../components/schemas/hotspot.yaml#/HotspotUserRecord' }
                error: { type: 'null' }
      '404': { $ref: '../components/responses.yaml#/NotFound' }

addUser:
  post:
    operationId: addHotspotUser
    summary: Create a hotspot user
    tags: [hotspot]
    description: |
      Body is a free-form `name → value` map mirroring RouterOS
      `/ip/hotspot/user/add` arguments. Common keys: `name`, `password`,
      `profile`, `server`, `mac-address`, `limit-uptime`,
      `limit-bytes-total`, `comment`.
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: { type: string }
            example:
              name: alice
              password: hunter2
              profile: 1d-1mbps
              server: hotspot1
    responses:
      '201':
        description: Created. `data.id` is the new RouterOS `.id`.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:
                  type: object
                  required: [id]
                  properties:
                    id: { type: string, example: '*42' }
                error: { type: 'null' }
      '400': { $ref: '../components/responses.yaml#/BadRequest' }
      '500': { $ref: '../components/responses.yaml#/InternalError' }

updateUser:
  put:
    operationId: updateHotspotUser
    summary: Update a hotspot user (partial)
    tags: [hotspot]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - $ref: '../components/parameters.yaml#/GenericResourceId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: { type: string }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/EmptyOK' }
            example:
              data: { message: user updated }
              error: null
      '400': { $ref: '../components/responses.yaml#/BadRequest' }

removeUser:
  delete:
    operationId: removeHotspotUser
    summary: Delete a hotspot user (with cascade cleanup)
    tags: [hotspot]
    description: |
      Removes the user plus any RouterOS scheduler/script that was
      auto-created for this user (best-effort; errors are logged but do
      not propagate).
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - $ref: '../components/parameters.yaml#/GenericResourceId'
    responses:
      '200':
        description: Removed.
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/EmptyOK' }
            example:
              data: { message: user removed }
              error: null
      '400': { $ref: '../components/responses.yaml#/BadRequest' }

resetUserCounters:
  post:
    operationId: resetHotspotUserCounters
    summary: Reset bytes-in/bytes-out for a hotspot user
    tags: [hotspot]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - $ref: '../components/parameters.yaml#/GenericResourceId'
    responses:
      '200':
        description: Counters reset.
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/EmptyOK' }
            example:
              data: { message: counters reset }
              error: null
      '500': { $ref: '../components/responses.yaml#/InternalError' }


# /routers/{routerId}/profile-mappings/* operations.
# Source: internal/api/handlers/profile_mapping_handler.go +
#         internal/models/profile_price_mapping.go.

ProfilePriceMapping:
  type: object
  required: [id, router_id, profile_name]
  description: |
    Per-router metadata for a hotspot profile name. Roskit overlays
    these values onto `/hotspot/profiles` responses (price, validity,
    expiration mode, lock flags). Profiles missing a mapping fall back
    to defaults defined elsewhere.
  properties:
    id:            { type: integer, format: int64 }
    router_id:     { type: integer, format: int64 }
    profile_name:  { type: string, maxLength: 100, example: 1d-1mbps }
    price:         { type: integer, format: int64, minimum: 0, example: 5000 }
    selling_price: { type: integer, format: int64, minimum: 0, example: 7500 }
    validity:      { type: string, maxLength: 20, example: 1d }
    exp_mode:      { type: string, maxLength: 10, example: rem }
    lock_user:     { type: boolean }
    lock_server:   { type: boolean }

UpdateMappingRequest:
  type: object
  description: Patch — only supplied fields are applied.
  properties:
    price:         { type: integer, format: int64, minimum: 0 }
    selling_price: { type: integer, format: int64, minimum: 0 }
    validity:      { type: string, maxLength: 64 }
    exp_mode:      { type: string, maxLength: 32 }
    lock_user:     { type: boolean }
    lock_server:   { type: boolean }

# --- operations ---------------------------------------------------------------

list:
  get:
    operationId: listProfileMappings
    summary: List profile→price/validity mappings for a router
    tags: [profile-mappings]
    parameters: [{ $ref: '../components/parameters.yaml#/RouterId' }]
    responses:
      '200':
        description: Mappings.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:
                  type: array
                  items: { $ref: '#/ProfilePriceMapping' }
                error: { type: 'null' }

update:
  put:
    operationId: updateProfileMapping
    summary: Upsert a profile mapping by profile name
    tags: [profile-mappings]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: path
        name: profileName
        required: true
        description: RouterOS profile name. URL-encode if it contains spaces.
        schema: { type: string, minLength: 1, maxLength: 100 }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/UpdateMappingRequest' }
          example:
            price: 5000
            selling_price: 7500
            validity: 1d
            exp_mode: rem
            lock_user: true
            lock_server: false
    responses:
      '200':
        description: Mapping upserted.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:  { $ref: '#/ProfilePriceMapping' }
                error: { type: 'null' }
      '400': { $ref: '../components/responses.yaml#/BadRequest' }
      '500': { $ref: '../components/responses.yaml#/InternalError' }

delete:
  delete:
    operationId: deleteProfileMapping
    summary: Delete a profile mapping by profile name
    tags: [profile-mappings]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - in: path
        name: profileName
        required: true
        schema: { type: string, minLength: 1, maxLength: 100 }
    responses:
      '200':
        description: Deleted.
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/EmptyOK' }
            example:
              data: { message: 'profile mapping deleted' }
              error: null
      '404': { $ref: '../components/responses.yaml#/NotFound' }

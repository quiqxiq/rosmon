                value:
                  ids:
                    - '*1'
                    - '*2'
                    - '*3'
      responses:
        '200':
          description: Bulk result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BulkResult'
                      meta:
                        type: object
                        properties:
                          total:
                            type: integer
                          success_count:
                            type: integer
                          failed_count:
                            type: integer
              examples:
                all_success:
                  summary: Semua sukses
                  value:
                    data:
                      succeeded:
                        - '*1'
                        - '*2'
                        - '*3'
                      failed: {}
                    meta:
                      total: 3
                      success_count: 3
                      failed_count: 0
                partial:
                  summary: Sebagian gagal
                  value:
                    data:
                      succeeded:
                        - '*1'
                        - '*3'
                      failed:
                        '*2': 'mikrotik: not found'
                    meta:
                      total: 3
                      success_count: 2
                      failed_count: 1

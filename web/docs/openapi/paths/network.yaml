releaseDHCPLease:
  delete:
    operationId: releaseDHCPLease
    summary: Release a DHCP lease (remove the binding)
    tags: [network]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - $ref: '../components/parameters.yaml#/GenericResourceId'
    responses:
      '200':
        description: Lease released.
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/EmptyOK' }
            example:
              data: { message: lease released }
              error: null

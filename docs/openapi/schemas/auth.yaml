# Schema autentikasi (Phase 2). Dipakai oleh paths/auth.yaml.

LoginRequest:
  type: object
  required: [username, password]
  properties:
    username:
      type: string
      example: admin
    password:
      type: string
      format: password
      example: supersecretpw

RefreshRequest:
  type: object
  required: [refresh_token]
  properties:
    refresh_token:
      type: string
      description: Refresh token yang diterima saat login sebelumnya.

LogoutRequest:
  type: object
  required: [refresh_token]
  properties:
    refresh_token:
      type: string

UserResponse:
  type: object
  properties:
    id: { type: integer, example: 1 }
    username: { type: string, example: admin }
    email: { type: string, format: email, example: admin@example.com }
    role:
      type: string
      enum: [admin, operator, viewer]
      example: admin
    active: { type: boolean, example: true }
    created_at: { type: string, format: date-time }
    updated_at: { type: string, format: date-time }

TokenResponse:
  type: object
  required: [access_token, refresh_token, token_type]
  properties:
    access_token:
      type: string
      description: |
        JWT HS256 access token. Pakai di header `Authorization: Bearer <token>`.
        TTL default 15 menit (lihat `JWT_ACCESS_TTL`).
    refresh_token:
      type: string
      description: |
        JWT HS256 refresh token (jti tersimpan di DB untuk rotation/revoke).
        TTL default 7 hari (`JWT_REFRESH_TTL`).
    token_type:
      type: string
      example: Bearer
    expires_in:
      type: integer
      description: Sisa detik sampai access_token expire.
      example: 900
    access_expires_at: { type: string, format: date-time }
    refresh_expires_at: { type: string, format: date-time }
    user: { $ref: '#/UserResponse' }

UserCreateRequest:
  type: object
  required: [username, password, role]
  properties:
    username:
      type: string
      minLength: 3
      maxLength: 64
    email:
      type: string
      format: email
    password:
      type: string
      format: password
      minLength: 8
    role:
      type: string
      enum: [admin, operator, viewer]
    active:
      type: boolean
      default: true

UserUpdateRequest:
  type: object
  description: |
    Semua field opsional. Field yang tidak di-include atau null akan
    dibiarkan unchanged. Ganti password atau ubah role/active akan
    me-revoke semua refresh token user.
  properties:
    email: { type: string, format: email }
    password:
      type: string
      format: password
      minLength: 8
    role:
      type: string
      enum: [admin, operator, viewer]
    active: { type: boolean }

MeResponse:
  allOf:
    - $ref: '#/UserResponse'

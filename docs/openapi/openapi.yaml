components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token (HS256). Diperoleh via `POST /auth/login`.
        Wajib di-include sebagai header `Authorization: Bearer <token>`
        kecuali untuk endpoint public (login, refresh, logout, /healthz).

  schemas:
    # Envelope & common
    Envelope:            { $ref: './schemas/envelope.yaml#/Envelope' }
    ErrorEnvelope:       { $ref: './schemas/envelope.yaml#/ErrorEnvelope' }
    ErrorPayload:        { $ref: './schemas/envelope.yaml#/ErrorPayload' }
    CountResponse:       { $ref: './schemas/envelope.yaml#/CountResponse' }
    IDResponse:          { $ref: './schemas/envelope.yaml#/IDResponse' }
    ActionResponse:      { $ref: './schemas/envelope.yaml#/ActionResponse' }
    BulkResult:          { $ref: './schemas/envelope.yaml#/BulkResult' }

    # Health
    HealthStatus:        { $ref: './schemas/health.yaml#/HealthStatus' }
    DeviceHealthStat:    { $ref: './schemas/health.yaml#/DeviceHealthStat' }

    # Device
    DeviceResponse:           { $ref: './schemas/device.yaml#/DeviceResponse' }
    DeviceCreateRequest:      { $ref: './schemas/device.yaml#/DeviceCreateRequest' }
    DeviceUpdateRequest:      { $ref: './schemas/device.yaml#/DeviceUpdateRequest' }
    DeviceWriteResponse:      { $ref: './schemas/device.yaml#/DeviceWriteResponse' }

    # System
    SystemIdentityResponse:    { $ref: './schemas/system.yaml#/SystemIdentityResponse' }
    SystemResourceResponse:    { $ref: './schemas/system.yaml#/SystemResourceResponse' }
    SystemRouterboardResponse: { $ref: './schemas/system.yaml#/SystemRouterboardResponse' }
    SystemClockResponse:       { $ref: './schemas/system.yaml#/SystemClockResponse' }
    ScriptResponse:            { $ref: './schemas/system.yaml#/ScriptResponse' }
    ScriptCreateRequest:       { $ref: './schemas/system.yaml#/ScriptCreateRequest' }
    ScriptUpdateRequest:       { $ref: './schemas/system.yaml#/ScriptUpdateRequest' }
    SchedulerResponse:         { $ref: './schemas/system.yaml#/SchedulerResponse' }
    SchedulerCreateRequest:    { $ref: './schemas/system.yaml#/SchedulerCreateRequest' }
    SchedulerUpdateRequest:    { $ref: './schemas/system.yaml#/SchedulerUpdateRequest' }
    LoggingAddHotspotDiskRequest: { $ref: './schemas/system.yaml#/LoggingAddHotspotDiskRequest' }

    # Hotspot
    HotspotUserResponse:       { $ref: './schemas/hotspot.yaml#/HotspotUserResponse' }
    HotspotUserCreateRequest:  { $ref: './schemas/hotspot.yaml#/HotspotUserCreateRequest' }
    HotspotUserUpdateRequest:  { $ref: './schemas/hotspot.yaml#/HotspotUserUpdateRequest' }
    HotspotProfileResponse:    { $ref: './schemas/hotspot.yaml#/HotspotProfileResponse' }
    HotspotProfileCreateRequest: { $ref: './schemas/hotspot.yaml#/HotspotProfileCreateRequest' }
    HotspotProfileUpdateRequest: { $ref: './schemas/hotspot.yaml#/HotspotProfileUpdateRequest' }
    HotspotProfileDeleteRequest: { $ref: './schemas/hotspot.yaml#/HotspotProfileDeleteRequest' }
    HotspotActiveResponse:     { $ref: './schemas/hotspot.yaml#/HotspotActiveResponse' }
    HotspotBindingResponse:    { $ref: './schemas/hotspot.yaml#/HotspotBindingResponse' }
    HotspotHostResponse:       { $ref: './schemas/hotspot.yaml#/HotspotHostResponse' }
    HotspotCookieResponse:     { $ref: './schemas/hotspot.yaml#/HotspotCookieResponse' }
    HotspotServerResponse:     { $ref: './schemas/hotspot.yaml#/HotspotServerResponse' }
    SetBoolRequest:            { $ref: './schemas/hotspot.yaml#/SetBoolRequest' }
    SetStringRequest:          { $ref: './schemas/hotspot.yaml#/SetStringRequest' }
    BulkIDsRequest:            { $ref: './schemas/hotspot.yaml#/BulkIDsRequest' }
    SetBindingTypeRequest:     { $ref: './schemas/hotspot.yaml#/SetBindingTypeRequest' }

    # Voucher
    VoucherGenerateRequest:    { $ref: './schemas/voucher.yaml#/VoucherGenerateRequest' }
    VoucherResponse:           { $ref: './schemas/voucher.yaml#/VoucherResponse' }
    VoucherGenerateResponse:   { $ref: './schemas/voucher.yaml#/VoucherGenerateResponse' }

    # Network
    InterfaceResponse:         { $ref: './schemas/network.yaml#/InterfaceResponse' }
    QueueSimpleResponse:       { $ref: './schemas/network.yaml#/QueueSimpleResponse' }
    IPPoolResponse:            { $ref: './schemas/network.yaml#/IPPoolResponse' }

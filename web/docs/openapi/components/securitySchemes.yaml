# Security schemes used across the Roskit API.
#
# Most endpoints require `bearerAuth`. Public endpoints (health, status,
# auth/login, auth/setup, auth/refresh) declare empty `security: []`.
# The webhook endpoint `/events/on-login` uses `webhookToken` instead.

bearerAuth:
  type: http
  scheme: bearer
  bearerFormat: JWT
  description: |
    JWT access token issued by `POST /auth/login`. Send as
    `Authorization: Bearer <token>`. SSE endpoints additionally accept
    `?token=<token>` since EventSource cannot set custom headers.

webhookToken:
  type: apiKey
  in: header
  name: X-Router-Token
  description: |
    Secret stored in `settings.webhook_token`. Required by
    `/events/on-login`. May also be supplied as a `token` form
    field for legacy MikroTik schedulers.

openapi: 3.0.3
info:
  title: rosmon HTTP API
  version: 1.0.0
  description: |
    REST + Server-Sent Events service di atas RouterOS API. Multi-router:
    semua endpoint (kecuali Device CRUD & Health) berada di bawah
    `/api/v1/devices/{device_id}/...` agar satu instance bisa melayani
    banyak router sekaligus.

    ## Response envelope

    Semua endpoint pakai envelope konsisten:

    - **Success single**: `{ "data": { ... } }`
    - **Success list**:   `{ "data": [ ... ], "meta": { "count": N } }`
    - **Error**:          `{ "error": { "code": "...", "message": "...", "path": "..." } }`

    Error `code` stabil — frontend bisa branch dengan aman. Mapping:

    | Code | HTTP | Trigger |
    |---|---|---|
    | `NOT_FOUND` | 404 | `mikrotik.ErrNotFound` |
    | `INVALID_ARGUMENT` | 400 | `mikrotik.ErrInvalidArgument` |
    | `AMBIGUOUS` | 409 | `mikrotik.ErrAmbiguous` |
    | `VALIDATION` | 400 | body gagal validasi `gin` binding |
    | `TIMEOUT` | 504 | `context.DeadlineExceeded` |
    | `CANCELED` | 499 | `context.Canceled` |
    | `INTERNAL` | 500 | uncategorized / panic recovery |
    | `DEVICE_NOT_FOUND` | 404 | device middleware: device ID tidak terhubung |
    | `SERVICE_UNAVAILABLE` | 503 | InfluxDB / dependency lain down |

    Setiap response menyertakan header `X-Request-ID` (16-char hex) untuk
    korelasi log.

    ## Authentication

    Service ini sekarang mendukung **JWT access + refresh token**
    (HS256). Bootstrap admin awal via env `ADMIN_USERNAME` / `ADMIN_PASSWORD`.

    1. `POST /auth/login` → terima access (15 menit) + refresh (7 hari) token.
    2. Pakai access token di header: `Authorization: Bearer <access_token>`.
    3. Saat access expire → `POST /auth/refresh` (rotation).
    4. `POST /auth/logout` revoke refresh token.

    Role RBAC sederhana: `admin` (full), `operator` (CRUD device-scoped tanpa
    `/auth/users`/reboot/shutdown), `viewer` (read-only).

    ## Rate Limit & SSE Subscriber Cap

    Semua endpoint authenticated: 60 req/menit per user (configurable via
    `RATE_LIMIT_USER_RPM`). Endpoint mahal (voucher generate, bulk delete,
    reboot, shutdown) dibatasi 10 req/menit. Endpoint anon (`/auth/login`,
    `/healthz`) dibatasi 20 req/menit per IP.

    SSE subscriber cap: 20 per topic, 50 per device (configurable). 429 +
    `Retry-After` header dikembalikan saat terlewat.

    ## Cara pakai SSE

    Endpoint `/stream/*` mengembalikan `text/event-stream`. Format event:
    ```
    event: <type>
    id: <id>
    data: <JSON payload>

    ```
    JS contoh: `new EventSource('/api/v1/devices/rb-main/stream/hotspot/active')`.
  contact:
    name: rosmon
    url: https://github.com/quiqxiq/rosmon
  license:
    name: Internal
servers:
  - url: http://127.0.0.1:8080/api/v1
    description: Default local-only bind
security:
  - bearerAuth: []
tags:
  - name: Devices
    description: |
      CRUD device (address, credential). Tidak butuh router fisik
      nyala — endpoint ini hanya menyentuh database.
  - name: System
    description: |
      Sistem-level RouterOS: identity, resource (CPU/mem/HDD), routerboard,
      clock, reboot/shutdown, logging config, /log read.
  - name: System Scripts
    description: CRUD `/system/script` (workflow on-login, transaksi, dll.).
  - name: System Schedulers
    description: CRUD `/system/scheduler` (expiry job, kron, dll.).
  - name: Hotspot Users
    description: CRUD user hotspot, bulk delete, reset counter/usage.
  - name: Hotspot Profiles
    description: CRUD profile hotspot.
  - name: Hotspot Sessions
    description: List & kick session aktif hotspot.
  - name: Hotspot Misc
    description: Server, Host, Cookie, Binding.
  - name: Vouchers
    description: Generator batch voucher (workflow).
  - name: Network
    description: Interface, IP pool, ARP, DHCP lease, simple queue.
  - name: PPP
    description: PPP secret, profile, active session.
  - name: Streaming
    description: |
      Server-Sent Events untuk update real-time. Tiap endpoint
      menggunakan broker shared yang fan-out ke banyak subscriber tanpa
      duplikasi backend stream.
  - name: History
    description: |
      Query data historis dari InfluxDB (CPU, traffic, sales). Hanya
      tersedia kalau `INFLUX_URL` di-set saat startup.
  - name: Reports
    description: |
      Laporan penjualan voucher dari database lokal (Postgres). Tetap
      bisa di-query meskipun router offline.
  - name: Health
    description: Health probe (DB + device manager + InfluxDB + SSE).
  - name: Auth
    description: |
      Login, refresh, logout, dan profil user yang sedang aktif. Tiga endpoint
      pertama public (override `security: []`), sisanya butuh Bearer token.
  - name: Users
    description: |
      CRUD user (admin role required). Mengubah password / role / active=false
      otomatis revoke semua refresh token milik user tersebut.
  - name: Profile Configs
    description: |
      Konfigurasi mikhmon-local per hotspot profile (validity, harga,
      expiry mode, lock MAC). Terpisah dari profile router-side.
  - name: Webhook
    description: |
      Endpoint internal yang dipanggil oleh on-login script MikroTik
      via `/tool/fetch`. **TIDAK pakai JWT** — router tidak bisa pegang
      token. **MVP**: tidak ada IP whitelist atau shared secret. Pakai
      firewall rule supaya hanya reachable dari router.
  - name: Notifications
    description: |
      Template pesan & jejak notifikasi WhatsApp (admin). Template di-seed
      saat migrate; admin hanya boleh edit body/name/active.
  - name: WhatsApp
    description: |
      Setup & status gateway WhatsApp embedded (whatsmeow). Login via QR oleh
      admin; sesi disimpan persisten di Postgres.
  - name: Audit
    description: Jejak aksi yang mengubah status entitas utama (admin, read-only).
  - name: Registrations
    description: |
      Alur registrasi pemasangan: submit publik → antrian admin (approve/reject/
      assign) → operator complete-install (subscription + invoice pertama).
paths:
  /healthz:
    get:
      tags:
        - Health
      summary: Health probe
      description: |
        Cek ringan dependency: DB ping, jumlah device terhubung vs total, status
        InfluxDB (kalau enabled), dan SSE subscriber + drop count. Status code
        200 kalau semua dependency relevan healthy, 503 kalau ada yang fail.
        Dipanggil oleh Kubernetes / load balancer probe.
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HealthStatus'
              examples:
                healthy:
                  summary: Semua dependency OK
                  value:
                    data:
                      ok: true
                      db: ok
                      devices:
                        connected: 3
                        total: 3
                      influx: ok
                      sse_subscribers:
                        hotspot-active:rb-main: 2
        '503':
          description: Salah satu dependency fail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HealthStatus'
              examples:
                db_down:
                  summary: DB tidak bisa di-ping
                  value:
                    data:
                      ok: false
                      db: 'error: connection refused'
                      devices:
                        connected: 0
                        total: 3
                all_disconnected:
                  summary: Semua router offline
                  value:
                    data:
                      ok: false
                      db: ok
                      devices:
                        connected: 0
                        total: 3
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login dengan username + password
      security: []
      description: |
        Verifikasi credentials, return access + refresh JWT. Access TTL
        default 15m, refresh TTL default 168h (7d). Refresh token punya
        `jti` unik tersimpan di tabel `refresh_tokens` untuk rotation /
        revocation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                summary: Admin login
                value:
                  username: admin
                  password: supersecretpw
      responses:
        '200':
          description: Token pair berhasil di-issue
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/ErrorValidation'
        '401':
          description: Invalid credentials atau user inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid:
                  value:
                    error:
                      code: INVALID_CREDENTIALS
                      message: invalid username or password
                      path: /api/v1/auth/login
        '429':
          $ref: '#/components/responses/ErrorRateLimit'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Tukar refresh token dengan pasangan token baru
      security: []
      description: |
        Rotation: refresh token lama di-revoke (jti) dan pasangan baru di-issue.
        Pemakaian token lama setelah ini akan ditolak (401 REFRESH_REVOKED).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Pasangan token baru
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Refresh token invalid / expired / sudah revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke refresh token (idempotent)
      security: []
      description: |
        Revoke refresh token. Access token tidak di-blacklist (stateless verify)
        — akan expire sendiri dalam <= access TTL. Pemanggilan dengan token
        garbage tetap return 204 (idempotent — tidak leak info).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
  /auth/me:
    get:
      tags:
        - Auth
      summary: Profil user yang sedang login
      description: Return claims user dari access token.
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /auth/users:
    get:
      tags:
        - Users
      summary: List semua user (admin only)
      description: Admin role required.
      responses:
        '200':
          description: List users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
    post:
      tags:
        - Users
      summary: Buat user baru (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            examples:
              operator:
                summary: Buat operator
                value:
                  username: opuser
                  password: strongpassword
                  role: operator
              viewer:
                summary: Buat viewer (read-only)
                value:
                  username: report-viewer
                  password: anothersafepw
                  role: viewer
      responses:
        '201':
          description: User dibuat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ErrorValidation'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '409':
          description: Username sudah dipakai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Users
      summary: Ambil detail user (admin only)
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    put:
      tags:
        - Users
      summary: Update user (admin only)
      description: |
        Field yang null/absent tetap unchanged. Mengubah password / role /
        active=false akan me-revoke semua refresh token user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            examples:
              disable:
                summary: Nonaktifkan user
                value:
                  active: false
              change_role:
                summary: Ubah role ke admin
                value:
                  role: admin
      responses:
        '200':
          description: User ter-update
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ErrorValidation'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    delete:
      tags:
        - Users
      summary: Hapus user (admin only)
      description: Soft delete (gorm DeletedAt). Refresh token user di-revoke semuanya.
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /devices:
    get:
      tags:
        - Devices
      summary: List all devices
      description: List semua device yang ter-register, termasuk yang `active=false`.
      responses:
        '200':
          description: List device
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DeviceResponse'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    post:
      tags:
        - Devices
      summary: Create new device
      description: |
        Daftarkan device baru ke service + langsung dial. Kalau dial gagal,
        device tetap di-save tapi response berisi `warning` (HTTP 201 tetap).
        Frontend bisa tampilkan notice tanpa kehilangan record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreateRequest'
            examples:
              tls_router:
                summary: Router via API-SSL (TLS)
                value:
                  display_name: RB Main Office
                  address: 192.168.88.1:8729
                  username: admin
                  password: secret123
                  use_tls: true
                  expiry_check_interval: 2m
              plain_router:
                summary: Router via API plain
                value:
                  display_name: RB Warehouse
                  address: 192.168.99.1:8728
                  username: admin
                  password: secret123
                  use_tls: false
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeviceWriteResponse'
              examples:
                success:
                  value:
                    data:
                      device:
                        id: 1
                        display_name: RB Main Office
                        address: 192.168.88.1:8729
                        username: admin
                        use_tls: true
                        status: connected
                        expiry_check_interval: 2m
                        active: true
                        created_at: '2026-05-19T10:00:00Z'
                with_warning:
                  summary: Dial gagal tapi record tersimpan
                  value:
                    data:
                      device:
                        id: 2
                        display_name: RB Warehouse
                        address: 192.168.99.1:8728
                        username: admin
                        use_tls: false
                        status: error
                        last_error: 'dial tcp 192.168.99.1:8728: connect: no route to host'
                        expiry_check_interval: 2m
                        active: true
                        created_at: '2026-05-19T10:01:00Z'
                      warning: 'device saved but connection failed: dial tcp ...'
        '400':
          $ref: '#/components/responses/ErrorValidation'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    get:
      tags:
        - Devices
      summary: Get device by ID
      responses:
        '200':
          description: Device detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeviceResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    put:
      tags:
        - Devices
      summary: Update device
      description: |
        Sparse update. Field yang tidak di-set tidak akan diubah. Kalau
        address/username/password berubah, koneksi lama di-disconnect dan
        device di-dial ulang dengan credential baru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdateRequest'
            examples:
              rotate_password:
                summary: Rotate password saja
                value:
                  password: new-secret-456
              disable:
                summary: Disable device tanpa hapus
                value:
                  active: false
      responses:
        '200':
          description: Device updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeviceWriteResponse'
        '400':
          $ref: '#/components/responses/ErrorValidation'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    delete:
      tags:
        - Devices
      summary: Delete device
      description: Hapus device dari DB + disconnect. Tidak menyentuh state di RouterOS.
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}/system/identity:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
      - $ref: '#/components/parameters/CacheQuery'
      - $ref: '#/components/parameters/TtlQuery'
    get:
      tags:
        - System
      summary: Get router identity
      description: '`/system/identity` — nama router. Cache opsional via `?cache=true&ttl=5m`.'
      responses:
        '200':
          description: Identity
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemIdentityResponse'
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
        '504':
          $ref: '#/components/responses/ErrorTimeout'
  /devices/{device_id}/system/resource:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    get:
      tags:
        - System
      summary: Get system resource (CPU/mem/HDD)
      description: Snapshot `/system/resource`.
      responses:
        '200':
          description: Resource snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemResourceResponse'
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}/system/routerboard:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    get:
      tags:
        - System
      summary: Get routerboard / firmware info
      responses:
        '200':
          description: Routerboard info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemRouterboardResponse'
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}/system/clock:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    get:
      tags:
        - System
      summary: Get system clock & timezone
      responses:
        '200':
          description: Clock
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemClockResponse'
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}/system/license:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    get:
      tags:
        - System
      summary: Get license info
      description: Snapshot `/system/license` — software-id, nlevel, features.
      responses:
        '200':
          description: License snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemLicenseResponse'
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}/system/reboot:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    post:
      tags:
        - System
      summary: Reboot router (DESTRUCTIVE)
      description: |
        ⚠️ Memicu reboot router. Koneksi service akan putus selama ~30-60 detik;
        device manager akan auto-reconnect setelah router online lagi.
      responses:
        '200':
          description: Reboot issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ActionResponse'
              examples:
                issued:
                  value:
                    data:
                      action: reboot
                      status: issued
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /devices/{device_id}/system/shutdown:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    post:
      tags:
        - System
      summary: Shutdown router (DESTRUCTIVE)
      description: |
        ⚠️ Power-off router. Tidak ada auto-reconnect; perlu intervensi fisik
        untuk power-on lagi.
      responses:
        '200':
          description: Shutdown issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ActionResponse'
        '404':
          $ref: '#/components/responses/ErrorDeviceNotFound'

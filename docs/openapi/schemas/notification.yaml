AuditLogResponse:
  type: object
  description: |
    Satu entry audit log — jejak aksi yang mengubah status entitas utama
    (subscription/invoice/payment/customer). `user_id` null = aksi sistem
    (cron/webhook). `old_values`/`new_values` adalah snapshot JSON (string).
  required: [id, action, entity_type, created_at]
  properties:
    id:          { type: integer, format: int64, example: 91 }
    user_id:     { type: integer, format: int64, nullable: true, example: 1 }
    action:      { type: string, example: "isolir" }
    entity_type: { type: string, example: "Subscription" }
    entity_id:   { type: integer, format: int64, nullable: true, example: 42 }
    old_values:  { type: string, example: "{\"status\":\"active\"}" }
    new_values:  { type: string, example: "{\"status\":\"isolir\"}" }
    ip_address:  { type: string, example: "10.0.0.5" }
    notes:       { type: string, example: "" }
    created_at:
      type: string
      format: date-time
      example: "2026-05-30T09:00:00+07:00"

MessageTemplateResponse:
  type: object
  description: |
    Template pesan notifikasi. `body` memakai sintaks text/template
    (`{{.FieldName}}`). `variables` adalah JSON array nama variabel untuk
    dokumentasi UI.
  required: [id, slug, name, body, active, created_at, updated_at]
  properties:
    id:        { type: integer, format: int64, example: 5 }
    slug:      { type: string, example: "invoice_issued" }
    name:      { type: string, example: "Tagihan Terbit" }
    body:      { type: string, example: "Halo {{.customer_name}}, tagihan {{.invoice_number}} sebesar Rp {{.amount}}." }
    variables: { type: string, example: "[\"customer_name\",\"invoice_number\",\"amount\"]" }
    active:    { type: boolean, example: true }
    created_at:
      type: string
      format: date-time
      example: "2026-05-01T00:00:00+07:00"
    updated_at:
      type: string
      format: date-time
      example: "2026-05-20T10:00:00+07:00"

MessageTemplateUpdateRequest:
  type: object
  description: |
    Update template (sparse). Slug immutable — tidak bisa diubah. Field yang
    tidak disertakan tidak diubah.
  properties:
    name:      { type: string, minLength: 1, maxLength: 200, example: "Tagihan Terbit" }
    body:      { type: string, minLength: 1, example: "Halo {{.customer_name}}, tagihan baru." }
    variables: { type: string, example: "[\"customer_name\"]" }
    active:    { type: boolean, example: true }

NotificationLogResponse:
  type: object
  description: |
    Jejak pengiriman notifikasi. Status: `pending` | `sent` | `failed` |
    `skipped`. `next_retry_at` di-isi saat `failed` (untuk job notif_retry).
  required: [id, template_slug, recipient_phone, message_body, status, retry_count, created_at]
  properties:
    id:              { type: integer, format: int64, example: 230 }
    customer_id:     { type: integer, format: int64, nullable: true, example: 12 }
    template_slug:   { type: string, example: "invoice_issued" }
    recipient_phone: { type: string, example: "081234567890" }
    message_body:    { type: string, example: "Halo Budi, tagihan INV-2026-05-0001..." }
    status:
      type: string
      enum: [pending, sent, failed, skipped]
      example: "sent"
    provider:        { type: string, example: "whatsmeow" }
    retry_count:     { type: integer, example: 0 }
    sent_at:
      type: string
      format: date-time
      nullable: true
      example: "2026-05-30T07:00:05+07:00"
    next_retry_at:
      type: string
      format: date-time
      nullable: true
      example: null
    created_at:
      type: string
      format: date-time
      example: "2026-05-30T07:00:00+07:00"

WhatsAppStatusResponse:
  type: object
  required: [connected]
  properties:
    connected: { type: boolean, example: true }
    jid:       { type: string, example: "628123456789:1@s.whatsapp.net" }

WhatsAppQRResponse:
  type: object
  required: [code]
  properties:
    code:
      type: string
      description: Data QR mentah. Frontend yang merender jadi gambar QR.
      example: "2@abcdef..."

WhatsAppTestRequest:
  type: object
  required: [phone, message]
  properties:
    phone:   { type: string, minLength: 3, maxLength: 20, example: "081234567890" }
    message: { type: string, minLength: 1, maxLength: 1000, example: "Tes notifikasi Rosmon" }

## docker-compose.test.yaml — Rosmon Seed Testing
##
## Menjalankan 5 PPPoE client + 1 hotspot test runner (hs-perm + voucher).
## Requires: seed data sudah ada di MikroTik (jalankan `go run ./cmd/seed/` dulu).
##
## Usage:
##   DOCKER_HOST="" docker compose -f docker-compose.test.yaml up -d
##   bash test-all.sh
##   DOCKER_HOST="" docker compose -f docker-compose.test.yaml down
##
## Network:
##   pppoe-net  macvlan on virbr-pppoe (192.168.111.0/24)
##   hotspot-net macvlan on virbr-hs  (192.168.123.0/24)
##   mgmt-net   bridge (untuk curl dari host ke hotspot-test)

services:

  # ─── PPPoE Client 1 — pppoe-user1 / Pppoe@1122 / paket-bronze ──────────────
  pppoe-test-1:
    image: alpine:latest
    container_name: pppoe-test-1
    hostname: pppoe-test-1
    privileged: true
    restart: "no"
    cap_add: [NET_ADMIN]
    networks:
      pppoe-net:
        ipv4_address: "192.168.111.201"
    environment:
      PPPOE_USER: pppoe-user1
      PPPOE_PASS: "Pppoe@1122"
    command: &pppoe-cmd >
      sh -c "
        apk add --no-cache ppp rp-pppoe 2>/dev/null &&
        printf '%s\t*\t%s\t*\n' \"$$PPPOE_USER\" \"$$PPPOE_PASS\" > /etc/ppp/chap-secrets &&
        chmod 600 /etc/ppp/chap-secrets &&
        PLUGIN=$$(ls /usr/lib/pppd/*/pppoe.so 2>/dev/null | head -1) &&
        echo \"[pppoe-test] user=$$PPPOE_USER plugin=$$PLUGIN\" &&
        pppd plugin $$PLUGIN eth0 \
          user $$PPPOE_USER password $$PPPOE_PASS \
          noauth noipdefault defaultroute \
          persist maxfail 3 holdoff 5 \
          logfile /var/log/pppd.log nodetach &
        sleep infinity
      "

  # ─── PPPoE Client 2 — pppoe-user2 / Pppoe@2233 / paket-silver ──────────────
  pppoe-test-2:
    image: alpine:latest
    container_name: pppoe-test-2
    hostname: pppoe-test-2
    privileged: true
    restart: "no"
    cap_add: [NET_ADMIN]
    networks:
      pppoe-net:
        ipv4_address: "192.168.111.202"
    environment:
      PPPOE_USER: pppoe-user2
      PPPOE_PASS: "Pppoe@2233"
    command: *pppoe-cmd

  # ─── PPPoE Client 3 — pppoe-user3 / Pppoe@3344 / paket-gold ────────────────
  pppoe-test-3:
    image: alpine:latest
    container_name: pppoe-test-3
    hostname: pppoe-test-3
    privileged: true
    restart: "no"
    cap_add: [NET_ADMIN]
    networks:
      pppoe-net:
        ipv4_address: "192.168.111.203"
    environment:
      PPPOE_USER: pppoe-user3
      PPPOE_PASS: "Pppoe@3344"
    command: *pppoe-cmd

  # ─── PPPoE Client 4 — pppoe-user4 / Pppoe@4455 / paket-bronze ──────────────
  pppoe-test-4:
    image: alpine:latest
    container_name: pppoe-test-4
    hostname: pppoe-test-4
    privileged: true
    restart: "no"
    cap_add: [NET_ADMIN]
    networks:
      pppoe-net:
        ipv4_address: "192.168.111.204"
    environment:
      PPPOE_USER: pppoe-user4
      PPPOE_PASS: "Pppoe@4455"
    command: *pppoe-cmd

  # ─── PPPoE Client 5 — pppoe-user5 / Pppoe@5566 / paket-silver ──────────────
  pppoe-test-5:
    image: alpine:latest
    container_name: pppoe-test-5
    hostname: pppoe-test-5
    privileged: true
    restart: "no"
    cap_add: [NET_ADMIN]
    networks:
      pppoe-net:
        ipv4_address: "192.168.111.205"
    environment:
      PPPOE_USER: pppoe-user5
      PPPOE_PASS: "Pppoe@5566"
    command: *pppoe-cmd

  # ─── Hotspot Test Runner ─────────────────────────────────────────────────────
  # Satu container Alpine yang menguji:
  #   - 2 customer hotspot permanent (hs-perm1, hs-perm2)
  #   - 3 voucher pertama dari .vouchers.json
  # Juga terhubung ke mgmt-net agar curl bisa dijalankan dari host.
  hotspot-test:
    image: alpine:latest
    container_name: hotspot-test
    hostname: hotspot-test
    restart: "no"
    networks:
      mgmt-net: {}
      hotspot-net:
        ipv4_address: "192.168.123.201"
    volumes:
      - ./.vouchers.json:/vouchers.json:ro
    command: >
      sh -c "
        apk add --no-cache curl jq 2>/dev/null &&
        echo 'hotspot-test ready — jalankan: bash test-all.sh' &&
        sleep infinity
      "

networks:
  # Bridge internal untuk akses dari host (curl, dll)
  mgmt-net:
    driver: bridge

  # macvlan di atas virbr-hs → L2 hotspot
  hotspot-net:
    driver: macvlan
    driver_opts:
      parent: "${HOTSPOT_BRIDGE:-virbr-hs}"
    ipam:
      driver: default
      config:
        - subnet: "${HOTSPOT_SUBNET:-192.168.123.0/24}"
          gateway: "${HOTSPOT_GW:-192.168.123.1}"
          ip_range: "${HOTSPOT_RANGE:-192.168.123.192/26}"

  # macvlan di atas virbr-pppoe → L2 PPPoE
  pppoe-net:
    driver: macvlan
    driver_opts:
      parent: "${PPPOE_BRIDGE:-virbr-pppoe}"
    ipam:
      driver: default
      config:
        - subnet: "${PPPOE_SUBNET:-192.168.111.0/24}"
          gateway: "${PPPOE_GW:-192.168.111.1}"
          ip_range: "${PPPOE_RANGE:-192.168.111.192/26}"

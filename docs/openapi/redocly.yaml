# Redocly lint config untuk OpenAPI spec roslib-mikhmon.
# Run: `npx @redocly/cli@latest lint docs/openapi/openapi.yaml`

extends:
  - recommended

rules:
  # Phase 2: service sekarang punya JWT auth (bearerAuth scheme di root).
  # Re-enable lint ini supaya tiap operasi explicit ada security: atau override.
  security-defined: error

  # Tag yang dipakai operasi sudah konsisten dengan tags di root.
  # `recommended` set sudah memvalidasi ini.

  # Warning yang sengaja diabaikan (cosmetic / opinion):
  operation-summary: warn
  operation-description: warn
  operation-operationId: off          # generated dari tag+path sudah cukup
  operation-4xx-response: warn        # banyak endpoint shared response — tidak semua error code
  operation-2xx-response: warn        # SSE & 204 endpoints valid kalau hanya itu
  tag-description: warn

  # No-unused-components: kita expose semua schemas via components.schemas
  # supaya muncul di tab Scalar "Schemas" — beberapa mungkin tidak di-$ref
  # langsung dari paths (di-ref via allOf inline).
  no-unused-components: off

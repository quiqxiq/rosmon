          example: 10.0.0.5/32
        parent:
          type: string
        disabled:
          type: boolean
        dynamic:
          type: boolean
        comment:
          type: string
        bytes:
          type: string
          example: 1234/5678
        packets:
          type: string
          example: 10/15
        rate:
          type: string
          example: 200/300
        total_rate:
          type: string
          example: '500'
        packet_rate:
          type: string
          example: 1/2
        total_packet_rate:
          type: string
          example: '3'
        queued_bytes:
          type: string
          example: 0/0
        total_queued_bytes:
          type: string
          example: '0'
        queued_packets:
          type: string
          example: 0/0
        total_queued_packets:
          type: string
          example: '0'
        total_bytes:
          type: string
          example: '6801'
        total_packets:
          type: string
          example: '25'
        dropped:
          type: string
          example: 0/0
        total_dropped:
          type: string
          example: '0'

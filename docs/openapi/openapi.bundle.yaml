components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token (HS256). Diperoleh via `POST /auth/login`.
        Wajib di-include sebagai header `Authorization: Bearer <token>`
        kecuali untuk endpoint public (login, refresh, logout, /healthz).
  schemas:
    Envelope:
      type: object
      description: Response envelope generik. Field `data` dan `error` saling eksklusif.
      properties:
        data:
          description: Payload sukses. Tipe spesifik tergantung endpoint.
        meta:
          type: object
          additionalProperties: true
          description: Metadata opsional, biasanya berisi `count` untuk list.
          example:
            count: 47
        error:
          $ref: '#/components/schemas/ErrorPayload'
    ErrorEnvelope:
      type: object
      description: Envelope untuk response error (status 4xx/5xx).
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorPayload'
    ErrorPayload:
      type: object
      description: Detail error yang stabil — frontend bisa branch via `code`.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable error code untuk branching di client.
          enum:
            - NOT_FOUND
            - INVALID_ARGUMENT
            - AMBIGUOUS
            - VALIDATION
            - TIMEOUT
            - CANCELED
            - INTERNAL
            - DEVICE_NOT_FOUND
            - SERVICE_UNAVAILABLE
        message:
          type: string
          description: Pesan error human-readable.
          example: user with id *99 not found
        path:
          type: string
          description: Path request yang menghasilkan error.
          example: /api/v1/devices/rb-main/hotspot/users/*99
        details:
          description: Payload tambahan (mis. validator detail). Tipe bebas.
    CountResponse:
      type: object
      description: Body untuk endpoint count-only.
      required:
        - count
      properties:
        count:
          type: integer
          format: int64
          minimum: 0
          example: 142
    IDResponse:
      type: object
      description: Body untuk endpoint create yang hanya kembalikan `.id`.
      required:
        - id
      properties:
        id:
          type: string
          description: RouterOS internal ID (`.id`).
          example: '*5'
    ActionResponse:
      type: object
      description: Body untuk endpoint control (mis. reboot, shutdown).
      required:
        - action
        - status
      properties:
        action:
          type: string
          example: reboot
        status:
          type: string
          example: issued
    BulkResult:
      type: object
      description: Hasil operasi bulk — berhasil dan gagal di-list eksplisit.
      required:
        - succeeded
        - failed
      properties:
        succeeded:
          type: array
          items:
            type: string
          description: List ID yang berhasil di-proses.
          example:
            - '*1'
            - '*2'
            - '*3'
        failed:
          type: object
          additionalProperties:
            type: string
          description: Map dari ID ke pesan error per item.
          example:
            '*4': 'mikrotik: not found'
            '*5': operation timed out
    HealthStatus:
      type: object
      description: |
        Status komposit service. `ok=true` artinya semua dependency yang relevan
        (DB, device manager, optional InfluxDB) sehat. Status code HTTP juga 200
        saat ok, 503 saat tidak ok.
      required:
        - ok
        - db
        - devices
      properties:
        ok:
          type: boolean
          example: true
        db:
          type: string
          description: Status DB ping. `ok`, `skipped` (DB tidak di-config), atau pesan error.
          example: ok
        devices:
          $ref: '#/components/schemas/DeviceHealthStat'
        influx:
          type: string
          description: Status InfluxDB. Hanya muncul kalau Influx di-enable.
          example: ok
        sse_subscribers:
          type: object
          additionalProperties:
            type: integer
          description: Map topic SSE → jumlah subscriber aktif (hanya topic dengan subs>0).
          example:
            hotspot-active:rb-main: 2
            log:all:rb-main: 1
        sse_dropped:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Map topic SSE → jumlah event yang di-drop karena subscriber lambat.
          example:
            hotspot-active:rb-main: 5
    DeviceHealthStat:
      type: object
      description: Ringkasan koneksi router yang dikelola.
      required:
        - connected
        - total
      properties:
        connected:
          type: integer
          example: 3
        total:
          type: integer
          example: 4
    DeviceResponse:
      type: object
      description: |
        Representasi device (RouterOS instance) yang ter-register di service.
        Password sengaja TIDAK di-expose; hanya disimpan di DB dan dikirim ke
        router saat dial.
      required:
        - id
        - display_name
        - address
        - username
        - use_tls
        - status
        - expiry_check_interval
        - active
        - created_at
      properties:
        id:
          type: integer
          format: int64
          example: 1
        display_name:
          type: string
          example: RB Main Office
        address:
          type: string
          description: host:port — `8728` untuk API, `8729` untuk API-SSL.
          example: 192.168.88.1:8728
        username:
          type: string
          example: admin
        use_tls:
          type: boolean
          example: false
        status:
          type: string
          description: Status koneksi terakhir.
          enum:
            - connected
            - disconnected
            - error
          example: connected
        last_seen:
          type: string
          format: date-time
          nullable: true
          description: Waktu terakhir status `connected` di-set.
        last_error:
          type: string
          description: Pesan error terakhir (kosong kalau healthy).
        expiry_check_interval:
          type: string
          description: Interval expiry-checker untuk device ini (Go duration).
          example: 2m
        time_zone:
          type: string
          description: |

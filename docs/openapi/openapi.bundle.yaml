        board_name:
          type: string
          example: RB951G-2HnD
        model:
          type: string
          example: 951G-2HnD
        revision:
          type: string
          example: r2
        serial_number:
          type: string
          example: 1234567890AB
        firmware_type:
          type: string
          example: ar9344
        current_firmware:
          type: string
          example: '7.13'
        upgrade_firmware:
          type: string
          example: '7.13'
    PingEvent:
      type: object
      description: Satu reply ICMP dari /stream/ping.
      required:
        - seq
        - host
        - size
        - time_ms
      properties:
        seq:
          type: integer
          example: 0
        host:
          type: string
          example: 8.8.8.8
        size:
          type: integer
          example: 56
        ttl:
          type: integer
          example: 115
        time_ms:
          type: number
          format: float
          example: 24
        status:
          type: string
          example: ''
    PingResult:
      type: object
      description: Satu reply ICMP echo dari RouterOS.
      properties:
        seq:
          type: integer
          description: Sequence number.
          example: 0
        host:
          type: string
          description: Target host.
          example: 8.8.8.8
        size:
          type: integer
          description: Packet size.
          example: 56
        ttl:
          type: integer
          description: TTL.
          example: 115
        time_ms:
          type: number
          format: float
          description: Round-trip time dalam milidetik.
          example: 24
        status:
          type: string
          description: Kosong = success, lainnya = timeout/unreachable.
          example: ''
    PingSummary:
      type: object
      description: Summary akhir dari command /ping count=N.
      properties:
        target:
          type: string
          example: 8.8.8.8
        sent:
          type: integer
          example: 5
        received:
          type: integer
          example: 5
        packet_loss_percent:
          type: number
          format: float
          example: 0
        min_rtt_ms:
          type: number
          format: float
          example: 23
        avg_rtt_ms:
          type: number
          format: float
          example: 24
        max_rtt_ms:
          type: number
          format: float
          example: 25
        results:
          type: array
          items:
            $ref: '#/components/schemas/PingResult'
    LogEntryResponse:
      type: object
      description: Satu entry log RouterOS dari /log/print (snapshot, bukan stream).
      required:
        - id
        - message
      properties:
        id:
          type: string
          example: '*1234'
        time:
          type: string
          example: '10:30:21'
        topics:
          type: string
          description: Topik log (comma-separated). Mis. `hotspot,info,account`.
          example: hotspot,info
        message:
          type: string
          example: user01 logged in
    HistoryRow:
      type: object
      description: |
        Satu baris hasil query InfluxDB. Kolom bervariasi per endpoint:

        - `/history/resource`: `time, cpu_load, free_memory, free_hdd_space`.
        - `/history/interfaces`: `time, interface, rx_bytes, tx_bytes, rx_pps, tx_pps`.
        - `/history/hotspot/users`: `time, user, profile, bytes_in_delta, bytes_out_delta`.
        - `/history/hotspot/active`: `time, user, event ("connect"|"disconnect"), session_id, mac, address`.
        - `/history/ppp/active`: `time, user, event, address`.
        - `/history/queues`: `time, queue, max_limit, bytes_in_delta, bytes_out_delta`.

        Skema dinamis (`additionalProperties: true`) supaya tidak berubah saat
        kolom InfluxDB di-extend. Value bisa scalar (string/number/bool) atau
        timestamp (RFC3339).
      additionalProperties: true
      example:
        time: '2026-05-18T08:00:00Z'
        cpu_load: 12
        free_memory: 67108864
        free_hdd_space: 100663296
    TransactionResponse:
      type: object
      description: |
        Satu row transaksi penjualan voucher (dicatat oleh webhook on-login
        handler untuk mode `remc`/`ntfc` saat user pertama login). Format
        `sale_date`/`sale_month` mengikuti konvensi mikhmonv3 (lowercase month).
      required:
        - id
        - sale_date
        - sale_time
        - sale_month
        - username
        - price
        - sell_price
        - created_at
      properties:
        id:
          type: integer
          format: int64
          example: 142
        sale_date:
          type: string
          example: jan/05/2026
        sale_time:
          type: string
          example: '10:30:21'
        sale_month:
          type: string
          example: jan2026
        username:
          type: string
          example: vc-a1b2c3d4
        price:
          type: integer
          example: 10000
        sell_price:
          type: integer
          example: 12000
        ip:
          type: string
          example: 10.0.0.5
        mac:
          type: string
          example: AA:BB:CC:DD:EE:FF
        validity:
          type: string
          example: 168h
        profile:
          type: string
          example: default
        comment:
          type: string
          example: login
        created_at:
          type: string
          format: date-time
          example: '2026-01-05T10:30:21+07:00'
    ReportSummary:
      type: object
      required:
        - count
        - total_price
        - total_sell_price
        - profit
      properties:
        count:
          type: integer
          example: 142
        total_price:
          type: integer
          description: Total cost (`price` × count).
          example: 1420000
        total_sell_price:
          type: integer
          description: Total revenue (`sell_price` × count).
          example: 1704000
        profit:
          type: integer
          description: total_sell_price − total_price.
          example: 284000
        by_profile:
          type: object
          additionalProperties:
            type: integer
          description: Count per profile name.
          example:
            default: 100
            vip: 42
        by_sell_price:
          type: object
          additionalProperties:
            type: integer
          description: Count per sell-price bucket (key = harga sebagai string).
          example:
            '10000': 100
            '20000': 42
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
          description: Detail tiap transaksi. Hanya di-isi kalau query `?include_transactions=true`.
    ReportTodayResponse:
      type: object
      required:
        - date
        - count
        - transactions
      properties:
        date:
          type: string
          example: may/19/2026
        count:
          type: integer
          example: 5
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: supersecretpw
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token yang diterima saat login sebelumnya.
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    TokenResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
      properties:
        access_token:
          type: string
          description: |
            JWT HS256 access token. Pakai di header `Authorization: Bearer <token>`.
            TTL default 15 menit (lihat `JWT_ACCESS_TTL`).
        refresh_token:
          type: string
          description: |
            JWT HS256 refresh token (jti tersimpan di DB untuk rotation/revoke).
            TTL default 7 hari (`JWT_REFRESH_TTL`).
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Sisa detik sampai access_token expire.
          example: 900
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserResponse'
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: admin
        email:
          type: string
          format: email
          example: admin@example.com
        role:
          type: string
          enum:
            - admin
            - operator
            - viewer
          example: admin
        active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserCreateRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          type: string
          enum:
            - admin
            - operator
            - viewer
        active:
          type: boolean
          default: true
    UserUpdateRequest:
      type: object
      description: |
        Semua field opsional. Field yang tidak di-include atau null akan
        dibiarkan unchanged. Ganti password atau ubah role/active akan
        me-revoke semua refresh token user.
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          type: string
          enum:
            - admin
            - operator
            - viewer
        active:
          type: boolean
    MeResponse:
      allOf:
        - $ref: '#/components/schemas/UserResponse'
    ProfileConfigResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        device_id:
          type: integer
          example: 1
        profile_name:
          type: string
          example: default
        expiry_mode:
          type: string
          enum:
            - '0'
            - rem
            - ntf
            - remc
            - ntfc
          description: |
            Mode aksi saat user expired:
            - `0`   = none / disable
            - `rem` = hapus user
            - `ntf` = set limit-uptime ke 0 + kick
            - `remc`= hapus + catat transaksi
            - `ntfc`= notice + catat transaksi
          example: rem
        validity:
          type: string
          description: |
            Format RouterOS canonical (hasil `rosfmt.FormatDuration`). Saat
            request, accept format apapun yang dikenali rosfmt (`168h`, `7d`,
            `1w`, `1mo`, `1y`); server normalize sebelum simpan.
          example: 1w
        price:
          type: integer
          example: 10000
        sell_price:
          type: integer
          example: 12000
        lock_mac:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProfileConfigUpsertRequest:
      type: object
      required:
        - expiry_mode
        - validity
      properties:
        expiry_mode:
          type: string
          enum:
            - '0'
            - rem
            - ntf
            - remc
            - ntfc
        validity:
          type: string
          description: |
            Durasi paket. Accept RouterOS (`7d`, `1w`, `1mo`, `1y`) atau Go
            (`168h`). Server normalize ke canonical RouterOS format saat simpan.
          example: 7d
        price:
          type: integer
          minimum: 0
          example: 10000
        sell_price:
          type: integer
          minimum: 0
          example: 12000
        lock_mac:
          type: boolean
          default: false
    AuditLogResponse:
      type: object
      description: |
        Satu entry audit log — jejak aksi yang mengubah status entitas utama
        (subscription/invoice/payment/customer). `user_id` null = aksi sistem
        (cron/webhook). `old_values`/`new_values` adalah snapshot JSON (string).
      required:
        - id
        - action
        - entity_type
        - created_at
      properties:
        id:
          type: integer
          format: int64
          example: 91
        user_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        action:
          type: string
          example: isolir
        entity_type:
          type: string
          example: Subscription
        entity_id:
          type: integer
          format: int64
          nullable: true
          example: 42
        old_values:
          type: string
          example: '{"status":"active"}'
        new_values:
          type: string
          example: '{"status":"isolir"}'
        ip_address:
          type: string
          example: 10.0.0.5
        notes:
          type: string
          example: ''
        created_at:
          type: string
          format: date-time
          example: '2026-05-30T09:00:00+07:00'
    MessageTemplateResponse:
      type: object
      description: |
        Template pesan notifikasi. `body` memakai sintaks text/template
        (`{{.FieldName}}`). `variables` adalah JSON array nama variabel untuk
        dokumentasi UI.
      required:
        - id
        - slug
        - name
        - body
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
          example: 5
        slug:
          type: string
          example: invoice_issued
        name:
          type: string
          example: Tagihan Terbit
        body:
          type: string
          example: Halo {{.customer_name}}, tagihan {{.invoice_number}} sebesar Rp {{.amount}}.
        variables:
          type: string
          example: '["customer_name","invoice_number","amount"]'
        active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-05-01T00:00:00+07:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-20T10:00:00+07:00'
    MessageTemplateUpdateRequest:
      type: object
      description: |
        Update template (sparse). Slug immutable — tidak bisa diubah. Field yang
        tidak disertakan tidak diubah.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Tagihan Terbit
        body:
          type: string
          minLength: 1
          example: Halo {{.customer_name}}, tagihan baru.
        variables:
          type: string
          example: '["customer_name"]'
        active:
          type: boolean
          example: true
    NotificationLogResponse:
      type: object
      description: |
        Jejak pengiriman notifikasi. Status: `pending` | `sent` | `failed` |
        `skipped`. `next_retry_at` di-isi saat `failed` (untuk job notif_retry).
      required:
        - id
        - template_slug
        - recipient_phone
        - message_body
        - status
        - retry_count
        - created_at
      properties:
        id:
          type: integer
          format: int64
          example: 230
        customer_id:
          type: integer
          format: int64
          nullable: true
          example: 12
        template_slug:
          type: string
          example: invoice_issued
        recipient_phone:
          type: string
          example: '081234567890'
        message_body:
          type: string
          example: Halo Budi, tagihan INV-2026-05-0001...
        status:
          type: string
          enum:
            - pending
            - sent
            - failed
            - skipped
          example: sent
        provider:
          type: string
          example: whatsmeow
        retry_count:
          type: integer
          example: 0
        sent_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-05-30T07:00:05+07:00'
        next_retry_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-05-30T07:00:00+07:00'
    WhatsAppStatusResponse:
      type: object
      required:
        - connected
      properties:
        connected:
          type: boolean
          example: true
        jid:
          type: string
          example: 628123456789:1@s.whatsapp.net
    WhatsAppQRResponse:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: Data QR mentah. Frontend yang merender jadi gambar QR.
          example: 2@abcdef...
    WhatsAppTestRequest:
      type: object
      required:
        - phone
        - message
      properties:
        phone:
          type: string
          minLength: 3
          maxLength: 20
          example: '081234567890'
        message:
          type: string
          minLength: 1
          maxLength: 1000
          example: Tes notifikasi Rosmon
    RegistrationResponse:
      type: object
      description: |
        Pengajuan pemasangan dari calon pelanggan. Status:
        `pending` | `approved` | `rejected` | `cancelled`.
      required:
        - id
        - full_name
        - phone
        - address
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
          example: 12
        full_name:
          type: string
          example: Pak Budi
        phone:
          type: string
          example: '081234567890'
        address:
          type: string
          example: Jl. Mawar No. 1
        area:
          type: string
          example: RT01/RW02
        notes:
          type: string
        ppp_profile_id:
          type: integer
          format: int64
          nullable: true
          description: Paket yang diminta (hint)
        device_id:
          type: integer
          format: int64
          nullable: true
          description: Router/area yang diminta (hint)
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - cancelled
          example: pending
        rejection_reason:
          type: string
        reviewed_by:
          type: integer
          format: int64
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        assigned_to:
          type: integer
          format: int64
          nullable: true
          description: Operator yang ditugaskan
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: Jadwal pemasangan
        installed_at:
          type: string
          format: date-time
          nullable: true
        customer_id:
          type: integer
          format: int64
          nullable: true
          description: Di-set saat approve/install
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RegistrationCreateRequest:
      type: object
      required:
        - full_name
        - phone
        - address
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 200
          example: Pak Budi
        phone:
          type: string
          minLength: 3
          maxLength: 20
          example: '081234567890'
        address:
          type: string
          minLength: 3
          maxLength: 2000
          example: Jl. Mawar No. 1
        area:
          type: string
          maxLength: 100
          example: RT01/RW02
        notes:
          type: string
          maxLength: 2000
        ppp_profile_id:
          type: integer
          format: int64
          description: Paket yang diminta (opsional)
        device_id:
          type: integer
          format: int64
          description: Router/area yang diminta (opsional)
    RegistrationApproveRequest:
      type: object
      description: Jadwal pemasangan opsional.
      properties:
        scheduled_at:
          type: string
          format: date-time
          example: '2026-06-01T09:00:00+07:00'
    RegistrationRejectRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
          example: Area belum tercover jaringan
    RegistrationAssignRequest:
      type: object
      required:
        - assigned_to
      properties:
        assigned_to:
          type: integer
          format: int64
          example: 3
          description: User ID operator
        scheduled_at:
          type: string
          format: date-time
    RegistrationCompleteInstallRequest:
      type: object
      description: Detail provisioning final yang diisi operator saat instalasi selesai.
      required:
        - device_id
        - service_type
        - mikrotik_username
        - mikrotik_password
      properties:
        device_id:
          type: integer
          format: int64
          example: 1
        service_type:
          type: string
          enum:
            - pppoe
            - hotspot
          example: pppoe
        ppp_profile_id:
          type: integer
          format: int64
          description: Wajib untuk pppoe
        hotspot_profile_id:
          type: integer
          format: int64
          description: Wajib untuk hotspot
        mikrotik_username:
          type: string
          minLength: 1
          maxLength: 100
          example: budi-001
        mikrotik_password:
          type: string
          minLength: 1
          maxLength: 200
        billing_day:
          type: integer
          minimum: 1
          maximum: 28
    ProfileConfigSyncResponse:
      type: object
      description: |
        Ringkasan hasil sync profile router → DB. Tiap kategori berisi
        profile name (string) yang masuk kategori tsb.
      required:
        - synced
        - created
        - orphan
        - injected
        - inject_failed
      properties:
        synced:
          type: array
          items:
            type: string
          description: |
            Profile router yang sudah ada di DB → tidak ditimpa (operator value
            seperti price/mode dipertahankan).
          example:
            - default
            - 30day
        created:
          type: array
          items:
            type: string
          description: |
            Profile router baru yang di-insert ke DB dengan default
            `expiry_mode: "0"`, `price: 0`, `validity: ""`. Operator perlu PUT
            untuk set price/mode agar selling record aktif.
          example:
            - new-promo
        orphan:
          type: array
          items:
            type: string
          description: |
            Config DB yang profile-nya sudah hilang dari router (mungkin
            di-delete via WinBox/CLI). Tidak dihapus otomatis dari DB.
          example:
            - legacy-profile
        injected:
          type: array
          items:
            type: string
          description: |
            Profile yang on-login script-nya berhasil di-push ke router.
          example:
            - default
            - 30day
        inject_failed:
          type: array
          items:
            type: string
          description: |
            Profile yang gagal di-inject. Format: `<profile>: <error>`. Tidak
            fatal — sync tetap completed dan profile lain tetap di-process.
          example: []
  parameters:
    DeviceIdPath:
      name: device_id
      in: path
      required: true
      description: Numeric device ID.
      schema:
        type: integer
        format: int64
        example: 1
    IdPath:
      name: id
      in: path
      required: true
      description: RouterOS internal ID (`.id`), biasanya format `*N` (mis. `*1`, `*2A`).
      schema:
        type: string
        example: '*1'
    NamePath:
      name: name
      in: path
      required: true
      description: Nama resource (user/profile/secret) untuk lookup by-name.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        example: user01
    PrefixPath:
      name: prefix
      in: path
      required: true
      description: Prefix topik RouterOS log, mis. `hotspot`, `info`.
      schema:
        type: string
        example: hotspot
    CacheQuery:
      name: cache
      in: query
      required: false
      description: Aktifkan caching untuk endpoint GET ini. Default `false`.
      schema:
        type: boolean
        default: false
    TtlQuery:
      name: ttl
      in: query
      required: false
      description: TTL cache dalam format Go duration (mis. `60s`, `5m`). Hanya berlaku saat `cache=true`.
      schema:
        type: string
        pattern: ^[0-9]+(ns|us|µs|ms|s|m|h)$
        example: 60s
    FromQuery:
      name: from
      in: query
      required: false
      description: Awal range waktu (RFC3339). Default `now-1h`.
      schema:
        type: string
        format: date-time
        example: '2026-05-18T08:00:00Z'
    ToQuery:
      name: to
      in: query
      required: false
      description: Akhir range waktu (RFC3339). Default `now`.
      schema:
        type: string
        format: date-time
        example: '2026-05-18T09:00:00Z'
    IntervalQuery:
      name: interval
      in: query
      required: false
      description: Interval bucket untuk agregasi atau polling (Go duration). Default tergantung endpoint (1m–2s).
      schema:
        type: string
        pattern: ^[0-9]+(ns|us|µs|ms|s|m|h)$
        example: 1m
    MonthQuery:
      name: month
      in: query
      required: false
      description: Filter bulan untuk laporan transaksi, format `<bln>jjjj` lowercase (mis. `jan2026`).
      schema:
        type: string
        pattern: ^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[0-9]{4}$
        example: jan2026
    DateQuery:
      name: date
      in: query
      required: false
      description: Filter tanggal untuk laporan transaksi, format mikhmon `<bln>/dd/yyyy` lowercase (mis. `jan/05/2026`).
      schema:
        type: string
        example: jan/05/2026
    MacQuery:
      name: mac
      in: query
      required: false
      description: Filter MAC address (case-insensitive). Pada `/network/arp` parameter ini WAJIB.
      schema:
        type: string
        pattern: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
        example: AA:BB:CC:DD:EE:FF
    ServerQuery:
      name: server
      in: query
      required: false
      description: Filter nama hotspot server.
      schema:
        type: string
        example: hotspot1
    ProfileQuery:
      name: profile
      in: query
      required: false
      description: Filter nama profile.
      schema:
        type: string
        example: default
    CommentQuery:
      name: comment
      in: query
      required: false
      description: Filter nilai field comment.
      schema:
        type: string
    UserQuery:
      name: user
      in: query
      required: false
      description: Filter berdasarkan username hotspot.
      schema:
        type: string
        example: user01
    TopicsQuery:
      name: topics
      in: query
      required: false
      description: Filter syslog topic (comma-separated). Mis. `hotspot,info`.
      schema:
        type: string
        example: hotspot,info
    ModeQuery:
      name: mode
      in: query
      required: false
      description: Mode streaming. `follow-only` = tanpa snapshot awal (event baru saja).
      schema:
        type: string
        enum:
          - follow-only
    IncludeTransactionsQuery:
      name: include_transactions
      in: query
      required: false
      description: Kalau `true`, response summary mencakup detail tiap transaksi.
      schema:
        type: boolean
        default: false
    NameQuery:
      name: name
      in: query
      required: false
      description: Filter nama (exact match).
      schema:
        type: string
    DynamicQuery:
      name: dynamic
      in: query
      required: false
      description: Filter queue dinamis (RouterOS auto-generated). `false` = hanya queue manual.
      schema:
        type: boolean
    SourceQuery:
      name: source
      in: query
      required: false
      description: Filter script berdasarkan substring source code.
      schema:
        type: string
    OwnerQuery:
      name: owner
      in: query
      required: false
      description: Filter script berdasarkan owner.
      schema:
        type: string
  responses:
    ErrorBadRequest:
      description: Request tidak valid (parameter atau body salah).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalid_argument:
              summary: Argumen invalid
              value:
                error:
                  code: INVALID_ARGUMENT
                  message: id tidak boleh kosong
                  path: /api/v1/devices/rb-main/hotspot/users/
    ErrorValidation:
      description: Body request gagal validasi schema (gin binding).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            validation_failed:
              summary: Field wajib tidak ada
              value:
                error:
                  code: VALIDATION
                  message: request validation failed
                  path: /api/v1/devices/rb-main/hotspot/users
                  details: 'Key: ''HotspotUserCreateRequest.Name'' Error:Field validation for ''Name'' failed on the ''required'' tag'
    ErrorNotFound:
      description: Resource yang dirujuk tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            user_not_found:
              summary: User tidak ada
              value:
                error:
                  code: NOT_FOUND
                  message: 'mikrotik: not found'
                  path: /api/v1/devices/rb-main/hotspot/users/*99
    ErrorDeviceNotFound:
      description: Device tidak ditemukan atau tidak terhubung. Dikembalikan oleh DeviceMiddleware.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            device_offline:
              summary: Device offline
              value:
                error:
                  code: DEVICE_NOT_FOUND
                  message: device not found or not connected
                  path: /api/v1/devices/rb-main/system/identity
    ErrorConflict:
      description: Operasi konflik dengan state existing (mis. ambiguous match).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            ambiguous:
              summary: Ambiguous match
              value:
                error:
                  code: AMBIGUOUS
                  message: 'mikrotik: ambiguous: multiple matches'
                  path: /api/v1/devices/rb-main/hotspot/users/by-name/user01
    ErrorTimeout:
      description: Operasi melewati batas waktu (ctx deadline / 5xx upstream timeout).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            upstream_timeout:
              summary: Router lambat respond
              value:
                error:
                  code: TIMEOUT
                  message: operation timed out
                  path: /api/v1/devices/rb-main/hotspot/users
    ErrorInternal:
      description: Error internal server. Dipakai untuk uncategorized + panic recovery.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            internal:
              summary: Unexpected error
              value:
                error:
                  code: INTERNAL
                  message: unexpected error during operation
                  path: /api/v1/devices/rb-main/hotspot/users
    ErrorServiceUnavailable:
      description: Dependency external (InfluxDB / DB) sedang tidak available.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            influx_down:
              summary: InfluxDB tidak terhubung
              value:
                error:
                  code: SERVICE_UNAVAILABLE
                  message: history backend unavailable
                  path: /api/v1/devices/rb-main/history/resource
    ErrorUnauthorized:
      description: |
        Token JWT tidak ada / invalid / expired / wrong-type. Response menyertakan
        header `WWW-Authenticate: Bearer realm="api"`.
      headers:
        WWW-Authenticate:
          description: Bearer challenge
          schema:
            type: string
            example: Bearer realm="api"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            missing:
              summary: Header Authorization tidak ada
              value:
                error:
                  code: UNAUTHORIZED
                  message: missing or malformed Authorization header
                  path: /api/v1/devices
            expired:
              summary: Access token expired
              value:
                error:
                  code: TOKEN_EXPIRED
                  message: token expired
                  path: /api/v1/devices
    ErrorForbidden:
      description: |
        Token valid tapi role tidak diizinkan mengakses endpoint ini
        (mis. operator coba akses /auth/users yang admin-only).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            role_forbidden:
              summary: Role tidak cukup
              value:
                error:
                  code: FORBIDDEN
                  message: role not authorized for this action
                  path: /api/v1/auth/users
    ErrorRateLimit:
      description: |
        Terlalu banyak request. Response menyertakan header `Retry-After`
        (detik). Berlaku untuk per-user (REST), per-IP (anon endpoint),
        per-endpoint-heavy (voucher generate, bulk-delete, reboot, shutdown),
        dan SSE subscriber cap (per-topic / per-device).
      headers:
        Retry-After:
          description: Detik sebelum boleh retry
          schema:
            type: integer
            example: 30
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            per_user:
              summary: Per-user limit terlewat
              value:
                error:
                  code: RATE_LIMIT
                  message: too many requests, slow down
                  path: /api/v1/devices
                  details:
                    retry_after_s: 30
                    scope: user
            sse_topic_cap:

# VPS Production Override
# Digunakan di VPS bersama docker/docker-compose.yml:
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.vps.yml up -d --build
#

services:
  postgres:
    profiles: ["donotstart"]
  influxdb3:
    profiles: ["donotstart"]

  backend:
    depends_on: []
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - default
      - db-tools_default
    env_file:
      - ../.env
    environment:
      # Override .env dengan nilai spesifik untuk network docker VPS db-tools_default
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=mikhmon
      - DB_USER=postgres
      - DB_PASSWORD=JituPasswordPostgres123!
      - DB_SSLMODE=disable
      - INFLUX_ENABLED=true
      - INFLUX_HOST=http://influxdb-db:8181
      - INFLUX_TOKEN=apiv3_DYEDNDoSz2X9YPCt5IpB0v70n5giIQ4ZQmzW7ttaYSZXw4s8KjnO848p4bzrCaZymB44ShbtLPUD0lhWASRSGA
      - INFLUX_DATABASE=mikhmon
      - HTTP_BIND=0.0.0.0:8080
      - CORS_ALLOWED_ORIGINS=https://rosmon.ghaibnet.co.id
      - GO_SERVICE_URL=https://rosmon.ghaibnet.co.id

  frontend:
    ports:
      - "127.0.0.1:8081:80"
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=

networks:
  db-tools_default:
    external: true



# /routers/{routerId}/network/* operations.
# Source: internal/api/handlers/network_handler.go.

listInterfaces:
  get:
    operationId: listInterfaces
    summary: List router interfaces
    tags: [network]
    parameters: [{ $ref: '../components/parameters.yaml#/RouterId' }]
    responses:
      '200':
        description: Interfaces.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/network.yaml#/InterfaceRecord' }
                error: { type: 'null' }
            example:
              data:
                - .id: '*1'
                  name: ether1
                  type: ether
                  mtu: '1500'
                  running: 'true'
                  disabled: 'false'
              error: null

getInterfaceTraffic:
  get:
    operationId: getInterfaceTraffic
    summary: Get current traffic rate for a single interface
    tags: [network]
    parameters:
      - $ref: '../components/parameters.yaml#/RouterId'
      - $ref: '../components/parameters.yaml#/InterfaceName'
    responses:
      '200':
        description: Live RX/TX snapshot.
        content:
          application/json:
            schema:
              type: object
              required: [data, error]
              properties:
                data: { $ref: '../components/schemas/network.yaml#/InterfaceTraffic' }
                error: { type: 'null' }
            example:
              data:
                iface: ether1
                rx: 152340
                tx: 84211
                rx_packets: 245
                tx_packets: 198
                timestamp: '2026-04-30T10:11:12Z'
              error: null
      '404': { $ref: '../components/responses.yaml#/NotFound' }


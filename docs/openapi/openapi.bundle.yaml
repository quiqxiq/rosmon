  /devices/{device_id}/hotspot/vouchers/generate:
    parameters:
      - $ref: '#/components/parameters/DeviceIdPath'
    post:
      tags:
        - Vouchers
      summary: Generate batch voucher
      description: |
        Workflow GenerateVouchers — create `batch_size` user random di
        `/ip/hotspot/user`. Username = `prefix` + random(length) dari charset.
        `user_mode=vc` → user==password (voucher code).
        `user_mode=up` → user & password independen.
        Kalau `validity` di-set, comment user di-stamp dengan tanggal
        expiry (untuk expiry service).

        Response 207 Multi-Status saat partial failure — voucher yang sudah
        ke-create tetap valid, frontend bisa rollback manual via bulk-delete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherGenerateRequest'
            examples:
              voucher_code:
                summary: 50 voucher code (user==password)
                value:
                  user_mode: vc
                  length: 8
                  prefix: vc-
                  charset: lower_number
                  profile: default
                  time_limit: 24h
                  validity: 168h
                  price: 10000
                  sell_price: 12000
                  batch_size: 50
              user_pass:
                summary: 10 user+pass terpisah, harian
                value:
                  user_mode: up
                  length: 6
                  charset: mixed_number
                  profile: vip-2m
                  time_limit: 12h
                  price: 25000
                  sell_price: 30000
                  batch_size: 10
      responses:
        '200':
          description: Semua voucher berhasil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VoucherGenerateResponse'
              examples:
                success:
                  summary: 50 voucher created
                  value:
                    data:
                      vouchers:
                        - id: '*1'
                          username: vc-a1b2c3d4
                          password: a1b2c3d4
                        - id: '*2'
                          username: vc-e5f6g7h8
                          password: e5f6g7h8
                      count: 50
        '207':
          description: Partial — sebagian voucher gagal di-create
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VoucherGenerateResponse'
              examples:
                partial:
                  summary: 9 dari 10 sukses, 10th duplikat
                  value:
                    data:
                      vouchers:
                        - id: '*1'
                          username: vc-aaaa1111
                          password: aaaa1111
                        - id: '*2'
                          username: vc-bbbb2222
                          password: bbbb2222
                      count: 9
                      partial: true
                      error: 'UserAdd "vc-cccc3333": mikrotik: duplicate name'
        '400':
          $ref: '#/components/responses/ErrorValidation'
        '500':
          $ref: '#/components/responses/ErrorInternal'

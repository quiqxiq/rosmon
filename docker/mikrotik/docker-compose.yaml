services:

  # ─── Hotspot Client (Firefox) ─────────────────────────────────────────────
  # Dua network interface:
  #   - mgmt-net  (bridge): agar port 5800 bisa diakses dari browser host
  #   - hotspot-net (macvlan): L2 langsung ke ether2 MikroTik (hotspot LAN)
  # Docker otomatis menambah route 192.168.123.0/24 via eth1 (macvlan),
  # sehingga Firefox di dalam container browsing via jaringan hotspot.
  hotspot-client1:
    image: jlesage/firefox:latest
    container_name: hotspot-client1
    hostname: hotspot-client1
    shm_size: "2gb"
    restart: unless-stopped
    ports:
      - "${FIREFOX_PORT:-5800}:5800"
    networks:
      mgmt-net: {}
      hotspot-net:
        ipv4_address: "${HOTSPOT_CLIENT_IP:-192.168.123.200}"
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=800

  # ─── PPPoE Client (Alpine + rp-pppoe) ─────────────────────────────────────
  # macvlan di atas virbr-pppoe → berada di L2 segment yang sama dengan
  # ether3 MikroTik → PADI discovery frame bisa sampai ke PPPoE server.
  pppoe-client1:
    image: alpine:latest
    container_name: pppoe-client1
    hostname: pppoe-client1
    privileged: true
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      pppoe-net:
        ipv4_address: "${PPPOE_CLIENT_IP:-192.168.111.200}"
    command: >
      sh -c "
        apk add --no-cache rp-pppoe ppp tcpdump 2>/dev/null &&
        mkdir -p /etc/ppp &&
        printf 'ETH=eth0\nUSER=${PPPOE_USER:-test}\nDEMAND=no\nDNS1=\nDNS2=\nPINGPATH=\n' > /etc/ppp/pppoe.conf &&
        printf '${PPPOE_USER:-test} * ${PPPOE_PASS:-1122} *\n' > /etc/ppp/chap-secrets &&
        chmod 600 /etc/ppp/chap-secrets &&
        echo '=== PPPoE tools ready. eth0 = macvlan on virbr-pppoe ===' &&
        echo 'Jalankan: docker exec -it pppoe-client1 pppoe-start' &&
        sleep infinity
      "

networks:
  # Bridge internal — hanya untuk akses port 5800 dari host
  mgmt-net:
    driver: bridge

  # macvlan di atas bridge libvirt hotspot → L2 ke ether2 MikroTik
  hotspot-net:
    driver: macvlan
    driver_opts:
      parent: "${HOTSPOT_BRIDGE:-virbr-hs}"
    ipam:
      driver: default
      config:
        - subnet: "${HOTSPOT_SUBNET:-192.168.123.0/24}"
          gateway: "${HOTSPOT_GW:-192.168.123.1}"
          ip_range: "${HOTSPOT_RANGE:-192.168.123.192/26}"

  # macvlan di atas bridge libvirt pppoe → L2 ke ether3 MikroTik (PPPoE server)
  pppoe-net:
    driver: macvlan
    driver_opts:
      parent: "${PPPOE_BRIDGE:-virbr-pppoe}"
    ipam:
      driver: default
      config:
        - subnet: "${PPPOE_SUBNET:-192.168.111.0/24}"
          gateway: "${PPPOE_GW:-192.168.111.1}"
          ip_range: "${PPPOE_RANGE:-192.168.111.192/26}"

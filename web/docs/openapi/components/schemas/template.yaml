# Print template schemas. Source:
#   internal/models/print_template.go
#   internal/services/template_service.go.

PrintTemplate:
  type: object
  required: [id, name, type, part, content, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
      example: 12
    name:
      type: string
      maxLength: 100
      example: 'Default thermal'
    type:
      type: string
      enum: [default, small, thermal]
    part:
      type: string
      enum: [header, row, footer]
    content:
      type: string
      maxLength: 65536
      description: Raw template body. HTML for `default`/`small`, plain text/HTML for `thermal`.
    created_at: { type: string, format: date-time }
    updated_at: { type: string, format: date-time }

CreateTemplateRequest:
  type: object
  required: [name, type, part, content]
  properties:
    name:    { type: string, minLength: 1, maxLength: 100 }
    type:    { type: string, enum: [default, small, thermal] }
    part:    { type: string, enum: [header, row, footer] }
    content: { type: string, minLength: 1, maxLength: 65536 }

UpdateTemplateRequest:
  type: object
  description: Patch — every field optional.
  properties:
    name:    { type: string, minLength: 1, maxLength: 100 }
    type:    { type: string, enum: [default, small, thermal] }
    part:    { type: string, enum: [header, row, footer] }
    content: { type: string, maxLength: 65536 }

RenderRequest:
  type: object
  required: [gencode, template_type, router_id]
  description: Render a template against cached vouchers identified by `gencode`.
  properties:
    gencode:       { type: string, minLength: 4, maxLength: 64 }
    template_type: { type: string, enum: [default, small, thermal] }
    profile:       { type: string, maxLength: 64 }
    validity:      { type: string, maxLength: 64 }
    time_limit:    { type: string, maxLength: 64 }
    data_limit:    { type: string, maxLength: 64 }
    price:         { type: string, maxLength: 64 }
    comment:       { type: string, maxLength: 200 }
    user_mode:     { type: string, maxLength: 32 }
    logo:          { type: string, maxLength: 255 }
    router_id:
      type: integer
      format: int64
      minimum: 1
